<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VChat</title>

<style>
body{
margin:0;
font-family:Arial,sans-serif;
background:#0b141a;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.box,#chat{
background:white;
width:340px;
padding:20px;
border-radius:15px;
text-align:center;
}

h1,h2{
color:#25D366;
}

input{
width:90%;
padding:10px;
margin:10px 0;
border-radius:8px;
border:1px solid gray;
}

button{
width:95%;
padding:10px;
background:#25D366;
color:white;
border:none;
border-radius:8px;
font-size:16px;
cursor:pointer;
}

#messages{
height:250px;
border:1px solid #ccc;
overflow-y:auto;
padding:10px;
margin-bottom:10px;
background:#ece5dd;
display:flex;
flex-direction:column;
}

.msg{
max-width:75%;
padding:8px 12px;
margin:6px 0;
border-radius:12px;
word-wrap:break-word;
}

.me{
background:#dcf8c6;
align-self:flex-end;
}

.other{
background:white;
align-self:flex-start;
}

.time{
font-size:11px;
color:gray;
text-align:right;
margin-top:4px;
}
</style>
</head>

<body>

<div class="box">

<h1>VChat</h1>

<p>Private Chat Between Two Friends</p>

<input id="username" placeholder="Enter Name">

<button onclick="login()">Login</button>

</div>

<div id="chat" style="display:none">

<h2>VChat</h2>
<p id="status" style="color:green;font-weight:bold;">🟢 Connecting...</p>

<p id="welcome"></p>

<div id="messages"></div>

<input id="msg" placeholder="Type Message">
<p id="typing" style="color:gray;font-size:13px;height:18px;"></p>

<button onclick="sendMessage()">Send</button>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-app.js";

import {
getDatabase,
ref,
push,
set,
onValue,
onChildAdded
} from "https://www.gstatic.com/firebasejs/12.0.0/firebase-database.js";

const firebaseConfig = {

apiKey:"AIzaSyAFmWxRpMPBslfxSpVt1NJoGPIRrqIDUng",

authDomain:"vchat-72067.firebaseapp.com",

databaseURL:"https://vchat-72067-default-rtdb.asia-southeast1.firebasedatabase.app",

projectId:"vchat-72067",

storageBucket:"vchat-72067.firebasestorage.app",

messagingSenderId:"455947882510",

appId:"1:455947882510:web:6d98dedb3db8c636a7ac5f"

};

const app=initializeApp(firebaseConfig);

const db=getDatabase(app);
const typingRef = ref(db,"typing");
const statusRef = ref(db, "status");
let user="";
window.login=function(){

user=document.getElementById("username").value.trim().toLowerCase();

if(user!="vivek" && user!="anil"){
alert("Access Denied ❌");
return;
}

document.querySelector(".box").style.display="none";

document.getElementById("chat").style.display="block";

document.getElementById("welcome").innerHTML="Welcome "+user;
set(statusRef, user + " is Online 🟢");

onValue(statusRef, (snapshot) => {
  document.getElementById("status").innerHTML = snapshot.val();
});

};


window.sendMessage=function(){

let msg=document.getElementById("msg").value.trim();
set(typingRef,"");

if(msg=="") return;

push(ref(db,"messages"),{

name:user,

text:msg,

time:new Date().toLocaleTimeString([],{
hour:"2-digit",
minute:"2-digit"
})

});

document.getElementById("msg").value="";
document.getElementById("msg").focus();

};
document.getElementById("msg").addEventListener("input",function(){

if(this.value.trim()!=""){
set(typingRef,user);
}else{
set(typingRef,"");
}

});

document.getElementById("msg").addEventListener("keypress", function(e){

if(e.key==="Enter"){

sendMessage();

}

});

onChildAdded(ref(db,"messages"),function(snapshot){

let data=snapshot.val();

let cls = (data.name == user) ? "me" : "other";

document.getElementById("messages").innerHTML +=
`
<div class="msg ${cls}">
<b>${data.name}</b><br>
${data.text}
<div class="time">${data.time}</div>
</div>
`;
let box = document.getElementById("messages");
box.scrollTop = box.scrollHeight;

document.getElementById("messages").scrollTop=
document.getElementById("messages").scrollHeight;

});

onValue(typingRef,function(snapshot){

let typingUser = snapshot.val();

if(typingUser && typingUser != user){

document.getElementById("typing").innerHTML =
"✍️ " + typingUser + " is typing...";

}else{

document.getElementById("typing").innerHTML = "";

}

});
</script>

</body>
</html>
