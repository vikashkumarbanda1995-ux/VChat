<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VChat</title>

<style>
body{
margin:0;
font-family:Arial,sans-serif;
background:#0b141a;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.box,#chat{
background:white;
width:95%;
max-width:400px;
padding:10px;
border-radius:5px;
text-align:center;
}

h1,h2{
color:#25D366;
}

input{
width:90%;
padding:10px;
margin:15px 0;
border-radius:1px;
border:1px solid gray;
}

button{
width:95%;
padding:10px;
background:#25D366;
color:black;
border:none;
border-radius:8px;
font-size:18px;
cursor:pointer;
}

#messages{
height:580px;
border:1px solid #ccc;
overflow-y:auto;
padding:10px;
margin-bottom:10px;
background:#ece5dd;
display:flex;
flex-direction:column;
}

.msg{
max-width:75%;
padding:10px 12px;
margin:8px 0;
border-radius:8px;
position:relative;
word-wrap:break-word;
box-shadow:0 1px 2px rgba(0,0,0,0.2);
}

.me{
background:#dcf8c6;
align-self:flex-end;
border-top-right-radius:2px;
}

.other{
background:white;
align-self:flex-start;
border-top-left-radius:2px;
}

.time{
font-size:11px;
color:gray;
text-align:right;
margin-top:4px;
}
.dark{
background:#121212;
color:white;
}

.dark #chat,
.dark .box{
background:#1e1e1e;
color:white;
}

.dark #messages{
background:#222;
}

.dark .other{
background:#333;
color:white;
}

.dark input{
background:#333;
color:white;
border:1px solid #555;
}
.reaction{
font-size:20px;
margin-top:5px;
}
#header{
display:flex;
justify-content:space-between;
align-items:center;
background:#075E54;
color:white;
padding:12px;
border-radius:10px 10px 0 0;
margin:-20px -20px 10px -20px;
}

#chatTitle{
font-size:22px;
font-weight:bold;
letter-spacing:1px;
}

#status{
font-size:12px;
color:#d8ffd8;
}

#themeBtn{
width:auto;
padding:5px 12px;
background:white;
color:#075E54;
border-radius:20px;
font-size:18px;
}
#inputArea{
display:flex;
flex-direction:column;
margin-top:10px;
}

#inputArea input{
flex:1;
margin:0;
}

#sendBtn{
width:55px;
height:55px;
border-radius:50%;
padding:0;
font-size:24px;
}

#emojiBox span{
font-size:24px;
margin:0 5px;
cursor:pointer;
}
#inputRow{
display:flex;
align-items:center;
gap:10px;
width:100%;
}

#inputRow input{
flex:1;
margin:0;
padding:14px;
border-radius:25px;
}

#attachBtn,
#sendBtn{
width:50px;
height:50px;
border-radius:50%;
font-size:22px;
padding:0;
}
#emojiBox{
margin-top:10px;
text-align:center;
}
</style>
</head>

<body>

<div class="box">

<h1>VChat</h1>

<p>Private Chat Between Two Friends</p>

<input id="username" placeholder="Enter Name">

<button onclick="login()">Login</button>

</div>

<div id="chat" style="display:none">

<div id="header">

<div>
<div id="chatTitle">💚 VChat</div>
<div id="status">🟢 Connecting...</div>
</div>

<button onclick="toggleTheme()" id="themeBtn">🌙</button>

</div>

<p id="welcome" style="margin:10px 0;font-weight:bold;color:#555;"></p>

<div id="messages"></div>

<div id="inputArea">

<div id="inputRow">

<button id="attachBtn" onclick="pickFile()">📎</button>

<input id="msg" placeholder="Type Message">

<button onclick="sendMessage()" id="sendBtn">📤</button>

</div>

<div id="emojiBox">
<span onclick="addEmoji('😀')">😀</span>
<span onclick="addEmoji('😂')">😂</span>
<span onclick="addEmoji('❤️')">❤️</span>
<span onclick="addEmoji('👍')">👍</span>
<span onclick="addEmoji('😎')">😎</span>
<span onclick="addEmoji('🎉')">🎉</span>
</div>

<p id="typing" style="color:gray;font-size:13px;height:18px;"></p>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-app.js";

import {
getDatabase,
ref,
push,
set,
onValue,
update,
remove,
onChildAdded
} from "https://www.gstatic.com/firebasejs/12.0.0/firebase-database.js";

const firebaseConfig = {

apiKey:"AIzaSyAFmWxRpMPBslfxSpVt1NJoGPIRrqIDUng",

authDomain:"vchat-72067.firebaseapp.com",

databaseURL:"https://vchat-72067-default-rtdb.asia-southeast1.firebasedatabase.app",

projectId:"vchat-72067",

storageBucket:"vchat-72067.firebasestorage.app",

messagingSenderId:"455947882510",

appId:"1:455947882510:web:6d98dedb3db8c636a7ac5f"

};

const app=initializeApp(firebaseConfig);

const db=getDatabase(app);
const typingRef = ref(db,"typing");
const statusRef = ref(db, "status");
let user="";
window.login=function(){

user=document.getElementById("username").value.trim().toLowerCase();

if(user!="vivek" && user!="anil"){
alert("Access Denied ❌");
return;
}

document.querySelector(".box").style.display="none";

document.getElementById("chat").style.display="block";

document.getElementById("welcome").innerHTML="Welcome "+user;
onValue(ref(db,"messages"), (snapshot) => {
  snapshot.forEach((child) => {
    let data = child.val();

    if (data.name !== user && !data.seen) {
      update(ref(db, "messages/" + child.key), {
        seen: true
      });
    }
  });
});
set(statusRef, user + " is Online 🟢");

onValue(statusRef, (snapshot) => {
  document.getElementById("status").innerHTML = snapshot.val();
});

};

window.addEmoji = function(emoji){

document.getElementById("msg").value += emoji;

document.getElementById("msg").focus();

}

window.pickFile = function(){

alert("📎 Attachment feature coming soon 😊");

}

window.reactMessage = function(id, emoji){

update(ref(db,"messages/"+id),{
reaction: emoji
});

}

window.deleteMessage = function(id){

if(confirm("Delete this message?")){

remove(ref(db,"messages/"+id));

}

}

window.toggleTheme = function(){

document.body.classList.toggle("dark");

let btn = document.getElementById("themeBtn");

if(document.body.classList.contains("dark")){

btn.innerHTML="☀️ Light Mode";

}else{

btn.innerHTML="🌙 Dark Mode";

}

}

window.sendMessage=function(){

let msg=document.getElementById("msg").value.trim();
set(typingRef,"");

if(msg=="") return;

push(ref(db,"messages"),{

name:user,

text:msg,

time:new Date().toLocaleTimeString([],{
hour:"2-digit",
minute:"2-digit"
}),
seen:false
});

document.getElementById("msg").value="";
document.getElementById("msg").focus();

};
document.getElementById("msg").addEventListener("input",function(){

if(this.value.trim()!=""){
set(typingRef,user);
}else{
set(typingRef,"");
}

});

document.getElementById("msg").addEventListener("keypress", function(e){

if(e.key==="Enter"){

sendMessage();

}

});

onValue(ref(db,"messages"),function(snapshot){

document.getElementById("messages").innerHTML = "";

snapshot.forEach((child)=>{

let data = child.val();

let id = child.key;

if(data.name != user && !data.seen){
update(ref(db,"messages/"+id),{
seen:true
});
}

let cls = (data.name == user) ? "me" : "other";
let delBtn = "";

if(data.name == user){

delBtn = `<br><button onclick="deleteMessage('${id}')" style="background:red;padding:4px 8px;font-size:12px;width:auto;">🗑 Delete</button>`;

}

document.getElementById("messages").innerHTML +=
`
<div class="msg ${cls}">
<b>${data.name}</b><br>
${data.text}
<div class="time">
${data.time}
${data.name==user ? (data.seen ? " ✓✓" : " ✓") : ""}
</div>

${data.reaction ? `<div class="reaction">${data.reaction}</div>` : ""}

<div class="reaction">${data.reaction || ""}</div>

<div style="margin-top:5px;">
<button onclick="reactMessage('${id}','👍')" style="width:auto;padding:2px 6px;">👍</button>
<button onclick="reactMessage('${id}','❤️')" style="width:auto;padding:2px 6px;">❤️</button>
<button onclick="reactMessage('${id}','😂')" style="width:auto;padding:2px 6px;">😂</button>
<button onclick="reactMessage('${id}','😮')" style="width:auto;padding:2px 6px;">😮</button>
</div>

${delBtn}

</div>
`;
let box = document.getElementById("messages");
box.scrollTop = box.scrollHeight;

document.getElementById("messages").scrollTop=
document.getElementById("messages").scrollHeight;

});

});

onValue(typingRef,function(snapshot){

let typingUser = snapshot.val();

if(typingUser && typingUser != user){

document.getElementById("typing").innerHTML =
"✍️ " + typingUser + " is typing...";

}else{

document.getElementById("typing").innerHTML = "";

}

});
</script>

</body>
</html>
